{% extends "base.html" %}

{% block title %}Desativar produto - Portal PDV{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body p-4">
                <div class="metric-icon bg-danger mb-3"><i class="bi bi-slash-circle"></i></div>
                <h1 class="h3 mb-2">Desativar produto</h1>
                <p class="text-muted">Tem certeza que deseja desativar <strong>{{ produto.nome }}</strong>? Ele deixara de aparecer na tela de venda.</p>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Desativar</button>
                    <a class="btn btn-outline-secondary" href="{% url 'produtos:lista' %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
