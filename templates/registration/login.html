{% extends "base.html" %}

{% block title %}Login - Portal PDV{% endblock %}

{% block content %}
<div class="login-shell">
    <div class="login-card">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <!-- Card centralizado para acesso ao sistema. -->
                <div class="text-center mb-4">
                    <div class="metric-icon bg-primary mx-auto mb-3"><i class="bi bi-shop"></i></div>
                    <h1 class="h3 mb-1">Portal PDV</h1>
                    <p class="text-muted mb-0">Gestao de inventario e vendas</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" autofocus class="form-control" id="{{ form.username.id_for_label }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" id="{{ form.password.id_for_label }}">
                        </div>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">Usuario ou senha invalidos.</div>
                    {% endif %}
                    <button class="btn btn-primary btn-lg w-100" type="submit">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
