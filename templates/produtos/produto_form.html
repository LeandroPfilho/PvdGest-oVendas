{% extends "base.html" %}

{% block title %}Produto - Portal PDV{% endblock %}

{% block content %}
<h1 class="h3 mb-3">{% if object %}Editar produto{% else %}Cadastrar produto{% endif %}</h1>

<form method="post" class="card">
    {% csrf_token %}
    <div class="card-body">
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Salvar</button>
        <a class="btn btn-outline-secondary" href="{% url 'produtos:lista' %}">Cancelar</a>
    </div>
</form>
{% endblock %}
