{% extends "base.html" %}

{% block title %}Estornar venda - Portal PDV{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body p-4">
                <div class="metric-icon bg-danger mb-3"><i class="bi bi-arrow-counterclockwise"></i></div>
                <h1 class="h3 mb-2">Estornar venda #{{ venda.pk }}</h1>
                <p class="text-muted">Confirme o estorno desta venda. Os produtos serao devolvidos ao estoque e o status mudara para estornada.</p>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Confirmar estorno</button>
                    <a class="btn btn-outline-secondary" href="{% url 'vendas:detalhe' venda.pk %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
